services:
  - type: web
    name: git-insight-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
