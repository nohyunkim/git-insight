        <article><h2>비공개 저장소 활동도 보이나요?</h2><p>Git Insight는 GitHub 공개 API 기반 분석 도구입니다. private 저장소의 활동은 공개 범위 제한으로 인해 결과에 충분히 반영되지 않거나 축소되어 보일 수 있습니다.</p></article>
        <article><h2>기간을 바꾸면 결과가 왜 달라지나요?</h2><p>7일, 30일, 90일, 6개월, 1년은 서로 다른 집계 창입니다. 기간이 길어질수록 누적 이벤트가 증가하고 활동 패턴도 다르게 보일 수 있습니다.</p></article>
