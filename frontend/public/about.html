        <main>
        <h1>Git Insight 서비스 소개</h1>
        <p>
            Git Insight는 공개 GitHub 활동 데이터를 기반으로 최근 개발 활동을 요약해 보여주는 웹 서비스입니다.
        </p>

        <h2>무엇을 제공하나요?</h2>
        <p>
            선택한 기간(7일, 30일, 90일, 6개월, 1년) 기준으로 이벤트 수, Push 활동, 활동 일수, 언어 분포, 이벤트 유형을
            시각화하고 해석 가이드를 제공합니다.
        </p>

        <h2>데이터 출처</h2>
        <p>
            본 서비스는 GitHub의 공개 API를 사용하여 공개 프로필/공개 저장소/공개 이벤트를 조회합니다.
            비공개 저장소 활동은 포함되지 않을 수 있습니다.
        </p>
